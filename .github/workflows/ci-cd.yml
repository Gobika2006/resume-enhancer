name: Resume Enhancer CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No deps"

      - name: Test
        run: echo "Working"

      - name: Done
        run: echo "Success 🚀"
